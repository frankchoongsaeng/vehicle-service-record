    VITE_BUGSINK_DSN: ${VITE_BUGSINK_DSN:-}
    VITE_BUGSINK_ENVIRONMENT: ${VITE_BUGSINK_ENVIRONMENT:-production}
    VITE_BUGSINK_TRACES_SAMPLE_RATE: ${VITE_BUGSINK_TRACES_SAMPLE_RATE:-0.15}
    VITE_BUGSINK_REPLAYS_SESSION_SAMPLE_RATE: ${VITE_BUGSINK_REPLAYS_SESSION_SAMPLE_RATE:-0}
    VITE_BUGSINK_REPLAYS_ON_ERROR_SAMPLE_RATE: ${VITE_BUGSINK_REPLAYS_ON_ERROR_SAMPLE_RATE:-1}

